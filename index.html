<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIST100 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 800px;
    margin-top: 30px;
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 8px;
    color: #e94560;
  }
  .subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 30px;
    font-size: 0.95rem;
  }
  .scoreboard {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .score-box {
    background: #16213e;
    border-radius: 10px;
    padding: 10px 22px;
    text-align: center;
    border: 1px solid #0f3460;
  }
  .score-box .num {
    font-size: 2rem;
    font-weight: bold;
  }
  .score-box .label { font-size: 0.78rem; color: #aaa; margin-top: 2px; }
  .score-box.correct .num { color: #4ecca3; }
  .score-box.wrong .num { color: #e94560; }
  .score-box.total .num { color: #f5a623; }
  .score-box.remain .num { color: #aaa; }

  .card {
    background: #16213e;
    border-radius: 16px;
    padding: 30px;
    border: 1px solid #0f3460;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .q-number {
    font-size: 0.85rem;
    color: #e94560;
    font-weight: bold;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .q-text {
    font-size: 1.05rem;
    line-height: 1.65;
    margin-bottom: 24px;
    white-space: pre-wrap;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #0f3460;
    border: 2px solid #0f3460;
    color: #eee;
    border-radius: 10px;
    padding: 13px 18px;
    cursor: pointer;
    font-size: 1rem;
    text-align: left;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    background: #1a4a8a;
    border-color: #4ecca3;
    transform: translateX(4px);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn .letter {
    min-width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .option-btn.correct {
    background: rgba(78, 204, 163, 0.2);
    border-color: #4ecca3;
    color: #4ecca3;
  }
  .option-btn.correct .letter { background: #4ecca3; color: #1a1a2e; }
  .option-btn.wrong {
    background: rgba(233, 69, 96, 0.2);
    border-color: #e94560;
    color: #e94560;
  }
  .option-btn.wrong .letter { background: #e94560; color: #fff; }
  .option-btn.reveal {
    background: rgba(78, 204, 163, 0.1);
    border-color: #4ecca3;
    color: #4ecca3;
  }
  .option-btn.reveal .letter { background: #4ecca3; color: #1a1a2e; }

  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    display: none;
  }
  .feedback.correct { background: rgba(78,204,163,0.15); border: 1px solid #4ecca3; color: #4ecca3; }
  .feedback.wrong { background: rgba(233,69,96,0.15); border: 1px solid #e94560; color: #e94560; }

  .next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .next-btn:hover { background: #c73652; transform: translateY(-2px); }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #0f3460;
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #f5a623);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .finish-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .finish-screen h2 { font-size: 2rem; margin-bottom: 16px; color: #4ecca3; }
  .finish-screen .big-score {
    font-size: 5rem;
    font-weight: bold;
    color: #f5a623;
    margin: 20px 0;
  }
  .finish-screen p { font-size: 1.1rem; color: #aaa; margin-bottom: 30px; }
  .restart-btn {
    padding: 14px 40px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #c73652; }

  @media (max-width: 500px) {
    .card { padding: 20px 16px; }
    .q-text { font-size: 0.97rem; }
    .option-btn { font-size: 0.93rem; padding: 11px 14px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>HIST100 Quiz</h1>
  <p class="subtitle">Sorular rastgele sıralanmaktadır &bull; Sınava hazırlık</p>

  <div class="scoreboard">
    <div class="score-box correct"><div class="num" id="sc-correct">0</div><div class="label">Dogru</div></div>
    <div class="score-box wrong"><div class="num" id="sc-wrong">0</div><div class="label">Yanlis</div></div>
    <div class="score-box total"><div class="num" id="sc-answered">0</div><div class="label">Cevaplanan</div></div>
    <div class="score-box remain"><div class="num" id="sc-remain">100</div><div class="label">Kalan</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div class="card" id="quiz-card">
    <div class="q-number" id="q-number"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Sonraki Soru &rarr;</button>
  </div>

  <div class="card finish-screen" id="finish-screen">
    <h2>Tebrikler!</h2>
    <div class="big-score" id="final-score"></div>
    <p id="final-text"></p>
    <button class="restart-btn" onclick="restartQuiz()">Tekrar Baslat</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "Bir devlette egemenliğin aşağıdakilerden hangisi tarafından kullanılması doğrudan teokratik bir yapılanmayı ifade eder?",
    o: ["Halk","Din adamları","Askerler","Bilim adamları","Sanatkârlar"],
    a: 1
  },
  {
    q: "28 Eylül 1911'de Osmanlı Devleti'ne bir nota veren İtalya, bu isteğinin reddi üzerine hangi bölgeye asker çıkarmıştır?",
    o: ["Makedonya","Selanik","Trablusgarp","Mora yarımadası","Musul"],
    a: 2
  },
  {
    q: `Mustafa Kemal, askeri büyükelçi olarak Sofya'ya gitmeden önceki günlerde siyasi görüşlerini şöyle belirtmişti; "Bu hanedandan ülkeye hayır yoktur. Hükümdarlık, ulusları mutlu ve gönençli kılmaz. Devletin esasını cumhuriyet ilkelerine göre hazırlamak gerekir."\n\nBuna göre Mustafa Kemal'in;\nI. Devlet düzenine muhalif olduğu\nII. Ulusal egemenliği savunduğu\nIII. İnkılapçı niteliklere sahip olduğu\nGörüşlerinden hangileri savunulabilir?`,
    o: ["Yalnız I","Yalnız III","I ve II","II ve III","I, II ve III"],
    a: 4
  },
  {
    q: "Osmanlı toplumunun çok partili siyasi hayatla tanışması ve partiler aracılığıyla siyasi düşüncelerini savunabilme fırsatını aşağıdaki dönemlerin hangisinde elde etmiştir?",
    o: ["II. Mahmut dönemi","I. Meşrutiyet dönemi","Tanzimat dönemi","III. Selim dönemi","II. Meşrutiyet Dönemi"],
    a: 4
  },
  {
    q: "Türk Anayasal gelişim tarihinde ilk defa Osmanlı Padişahı hangisiyle İngiltere'deki Magna Carta örneğinde olduğu gibi, kendisi dışında bir otoritenin varlığını kabul etmiştir?",
    o: ["Sened-i İttifak","Tanzimat Fermanı","Islahat Fermanı","1876 Kanun-i Esasisi","Teşkilat-ı Esasiye"],
    a: 0
  },
  {
    q: "Şeyhülislam Dürrizade Abdullah Efendi'nin yayınladığı Anadolu hareketini karalayıcı ve liderlerini lanetleyici fetvasına karşı, 153 müftünün imzaladığı karşı fetvaya öncülük eden Ankara müftüsü kimdir?",
    o: ["Elmalılı Hamdi Efendi","Molla Kasım","Rıfat (Börekçi) Bey","Bekir Sami Bey","Sait Molla"],
    a: 2
  },
  {
    q: "Çok uluslu devletleri ulusal devletlerle karşılaştırdığımızda en önemli farkın aşağıdakilerden hangisi olması beklenir?",
    o: ["Çok uluslu devletlerde yönetimlerin belirli güç odakları arasında paylaştırılmış olması","Çok uluslu devletlerde toplumda birlikte hareket etme dürtüsünün yeterince gelişmemiş olması","Çok uluslu devletlerin yayılmacı siyaseti benimsemeleri","Çok uluslu devletlerin yarı bağımlı bir yapıya sahip olmaları","Çok uluslu devletlerde toplumdaki ayrışma ve ötekileşmenin artması"],
    a: 1
  },
  {
    q: "I. Dünya Savaşı sırasında Osmanlı hükümetinin Ermenileri tehcir için bir yasa çıkarması, aşağıdaki cephelerden hangisinin güvenliğini doğrudan sağlamaya yöneliktir?",
    o: ["Çanakkale","Kafkas","Kanal","Süveyş","Galiçya"],
    a: 1
  },
  {
    q: "Osmanlı Devleti'nde 1876 yılında kabul edilen ilk anayasanın adı nedir?",
    o: ["Magna Carta","Tanzimat Fermanı","Teşkilat-ı Esasiye","Kanun-ı Esasi","Islahat Fermanı"],
    a: 3
  },
  {
    q: "Birinci Dünya Savaşı sonunda Osmanlı'nın imzaladığı ateşkes antlaşması aşağıdakilerden hangisinde doğru olarak verilmiştir?",
    o: ["Sevr","Mondros","Mudanya","Lozan","Ankara"],
    a: 1
  },
  {
    q: "Fransız Devriminin oluşum nedenleri içerisinde hangisi yer almaz?",
    o: ["Ekonomik sıkıntılar ve ağır vergiler","Özgürlükler üzerindeki baskılar","Toplumda oluşan derin sınıflaşmalar","İşçi sınıfının artarak devam eden sorunları","Fransız aydınlarının özgürlüklerin önünü açma çabaları"],
    a: 3
  },
  {
    q: "Osmanlı Devleti, Batılı devletlerin azınlık haklarını bahane ederek iç işlerine karışmasını önlemek için 19. yüzyılda yeni düzenlemeler yapmıştır. Aşağıdakilerden hangisi bu amaçla yapılmış düzenlemelerden biri değildir?",
    o: ["Tanzimat Fermanı","Kanun-ı Esasi","Meşrutiyet'in ilanı","Islahat Fermanı","Sened-i İttifak"],
    a: 4
  },
  {
    q: "Aşağıdakilerden hangisi XIX. yüzyılda Osmanlı Devleti'nde yapılan ıslahat hareketlerinin özelliklerinden biri değildir?",
    o: ["Batılı devletlerin, Osmanlı Devleti'nin iç işlerine karışmasını önlemek istenmesi","Müslüman olmayanları memnun edecek çeşitli düzenlemeleri içermesi","İktisadi alanda gelişmenin hedeflenmesi","Avrupa kültürünün etkisinde hazırlanması","Avrupa devletlerinin desteğinin sağlanmasının amaçlanması"],
    a: 2
  },
  {
    q: "Kanun-u Esasi'yi, Tanzimat ve Islahat Fermanı'ndan ayıran özellik aşağıdakilerden hangisidir?",
    o: ["Padişah izniyle kabul edilmiş olması","Batı uygarlığından etkilenmiş olması","Halka inanç özgürlüğünün tanınması","Halktan gelirine göre vergi alınması","Halka temsil hakkının tanınması"],
    a: 4
  },
  {
    q: "Tanzimat döneminde yapılan aşağıdaki yeniliklerden hangisi, padişahın üzerinde bir gücün kabul edilmeye başlandığının göstergesidir?",
    o: ["Vilayet yönetimlerinin kurulması","Askeri alanda yeniliklerin yapılması","Müslüman olmayanlara yeni haklar verilmesi","Kanun yapacak kurumların oluşturulması","Şeyhülislamın görevlerinin sınırlandırılması"],
    a: 3
  },
  {
    q: "Osmanlı Devleti'nde Sened-i İttifak'ın imzalanmasıyla hangisinin siyasal gücü resmen tanınmıştır?",
    o: ["Yeniçeriler","Ulema","Genç Osmanlılar","Mültezimler","Ayanlar"],
    a: 4
  },
  {
    q: "Aşağıdakilerden hangisi Osmanlı Devletinin yıkılışının iç nedenlerindendir?",
    o: ["Azınlıkların devlet aleyhindeki faaliyetleri","Ordu teşkilatının bozulması","Ekonomik yapının bozulması","Bürokrasideki bozulma","Hepsi"],
    a: 4
  },
  {
    q: "Fransız Devrimi'nin toplumlar üzerindeki en belirgin etkileri aşağıdaki seçeneklerden hangisinde doğru olarak verilmiştir?",
    o: ["Rönesans ve Hümanist Düşünce","Merkantilizm ve Sermaye birikimi","Milliyetçilik ve Bağımsızlık hareketleri","Sömürgecilik Düşüncesi","Faşizm ve Devlet tekeli"],
    a: 2
  },
  {
    q: `Etnik kökenleri, dilleri, gelenekleri, inançları birbirinden ayrı siyasal gücün dayatmasıyla bir arada tutulan birden çok topluluğun bir araya gelerek oluşturduğu siyasal modele imparatorluk denilir.\n\nBu tür devlet anlayışında aşağıdakilerden hangisinin görülmesi beklenemez?`,
    o: ["Ortak ulusal değerler","Farklı inançsal yapılar","Baskıcı siyasal yönetim anlayışı","Çok uluslu yapı","Dil karmaşası"],
    a: 0
  },
  {
    q: "Osmanlı İmparatorluğu'nun son dönemlerindeki düşünce akımlarından \"İslamcılık\" ve \"Osmanlıcılık\"ın etkilerini yitirmesi II. Meşrutiyet döneminde aşağıdaki fikir akımlarından hangisinin önem kazanmasına yol açmıştır?",
    o: ["Türkçülük","Islahatçılık","Devletçilik","Ümmetçilik","Tanzimatçılık"],
    a: 0
  },
  {
    q: "Aşağıdakilerden hangisi Osmanlı Devleti'nde 1876 yılında ilan edilen I. Meşrutiyetle birlikte görülen gelişmelerden biri değildir?",
    o: ["Halkın da yönetime katılması mümkün olmuştur","Siyasi partiler oluşmuştur","İlk Osmanlı anayasası oluşturulmuştur","Ayan Meclisi meydana getirilmiştir","Padişaha geniş yetkiler tanınmıştır"],
    a: 1
  },
  {
    q: "Daha önce de başka toplumlar tarafından denemesi yapılan ______, Jan Gutenberg tarafından 1450 yılında icat edildi. _______, büyük bir devrim yaratmıştı; çünkü bilgiyi hızlı yaymanın en etkili yoluydu.\n\nYukarıdaki paragrafta boş bırakılan bölümlere aşağıdaki kavramlardan hangisinin getirilmesi uygun düşer?",
    o: ["Barut","Ateşli silahlar","Pusula","Matbaa","Yazı"],
    a: 3
  },
  {
    q: "Aşağıdakilerden hangisi ile ülkedeki direniş cemiyetleri \"Anadolu ve Rumeli Müdafaa-i Hukuk Cemiyeti\" adı altında birleştirilmiştir?",

    a: 3
  },
  {
    q: "Mustafa Kemal Paşa, Kurtuluş Savaşı'nı başlatmak için aşağıdakilerden hangisine öncelik vermiştir?",
    o: ["Saltanatı ve hilafeti kaldırmak","Düzenli bir ordu kurmak","Ulusu bilinçlendirip örgütlemek","İç ayaklanmaları bastırmak","Yeni bir anayasa hazırlamak"],
    a: 2
  },
  {
    q: `Erzurum Kongresi'nde "Azınlıklara, siyasal egemenliği ve sosyal dengeyi bozacak şekilde yeni birtakım özel haklar verilmesi kabul edilmeyecektir" kararı alınmıştır.\n\nBu karar aşağıdakilerden hangisine bir tepkidir?`,
    o: ["Her türlü işgal ve ayrıcalıklara","Azınlıkların İstanbul'da kalmasına","Azınlıklara daha önce verilmiş imtiyazlara","Patrikhanenin Rumların dinî temsilcisi olmasına","Türkiye içindeki Müslüman olmayan azınlıkların Türk tebaası sayılmasına"],
    a: 0
  },
  {
    q: "Ulusal Kurtuluş Savaşı'nda, bağımsızlık düşüncesinin dayanacağı gücün \"ulus iradesi\" olduğu, ilk kez aşağıdakilerin hangisinde vurgulanmıştır?",
    o: ["Amasya Genelgesi","Erzurum Kongresi kararları","Misak-ı Milli","Sivas Kongresi kararları","Amasya Görüşmesi"],
    a: 0
  },
  {
    q: "Aşağıdakilerden hangisi, Çanakkale Savaşı'nın sonuçları arasında yer almaz?",
    o: ["Birinci Dünya Savaşının süresinin uzaması","Dolaylı olarak Rusya'da yönetim değişikliğinin yaşanması","Amerika'nın savaşa girmesine yol açması","Eğitimli ve genç nüfusun yitirilmesi","Mustafa Kemal Paşa'nın Ulusal Kurtuluş Savaşı Önderi olmasına zemin hazırlaması"],
    a: 2
  },
  {
    q: "I. TBMM'de Mustafa Kemal Paşa ve O'nun düşüncelerini paylaşanlar tarafından kurulan grup hangisidir?",
    o: ["Müdafaa-i Hukuk","Islahat","Tesanüt","Felah-ı Vatan","Azm-i Milli"],
    a: 0
  },
  {
    q: `Amasya Genelgesi'nde "vatanın bütünlüğü ve bağımsızlının tehlikede olduğu, İstanbul Hükümeti'nin sorumluluğunu yerine getiremediği ve ulusu yok olmuş duruma düşürdüğü" belirtilmiştir.\n\nBu sözlerin Kurtuluş Savaşı hakkında aşağıdakilerden hangisiyle ilgili bilgi verdiği savunulabilir?`,

    a: 1
  },
  {
    q: "Almanya'nın Birinci Dünya Savaşında Osmanlı Devleti'ni kendi yanına çekmeye çalışmasının nedenleri arasında aşağıdakilerden hangisi gösterilemez?",
    o: ["İtilaf Devletleri'nin savaşacağı cephelerin sayısını artırmak","Osmanlı Devleti'nin halifelik gücünden yararlanmak","Osmanlı Devleti'nin insan gücünü değerlendirmek","Osmanlı Devleti'nin teknik gücünden faydalanmak","Ortadoğu'da egemenliğin İngiltere'nin eline geçmesini önlemek"],
    a: 3
  },
  {
    q: "Sivas Kongresi'nde, tüm direniş cemiyetlerinin Anadolu ve Rumeli Müdafaa-i Hukuk Cemiyeti adı altında toplanması kararının alınmasındaki temel hedef hangisidir?",
    o: ["Ulusal mücadeleyi tek elden yönetmek","Asker iktidarını güçlendirmek","İstanbul hükümetine baskı yapmak","İşgalci güçleri zor durumda bırakmak","Yurt içinde çıkan isyanları kolayca bastırmak"],
    a: 0
  },
  {
    q: "Anlaşma Devletlerinin İstanbul'u resmen işgal etmeleri, aşağıdaki gelişmelerden hangisine vermiş oldukları tepkinin sonucudur?",
    o: ["Amasya Genelgesi'nin yayımlanmasına","Osmanlı Meclisi'nin yeniden açılmasına","Sivas Kongresi'nde alınmış olan kararlara","Misak-ı Milli'nin onaylanmasına","Mustafa Kemal Paşa'nın Ankara'ya yerleşmesine"],
    a: 3
  },

let shuffled = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;

const letters = ['A','B','C','D','E'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  shuffled = shuffle(questions.map((q,i) => i));
  current = 0;
  correct = 0;
  wrong = 0;
  updateScore();
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('finish-screen').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const idx = shuffled[current];
  const q = questions[idx];

  document.getElementById('q-number').textContent = `Soru ${current + 1} / ${shuffled.length}`;
  document.getElementById('q-text').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn, q.a, opts);
    opts.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const pct = (current / shuffled.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function selectAnswer(chosen, btn, correct_idx, opts) {
  if (answered) return;
  answered = true;

  const buttons = opts.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');

  if (chosen === correct_idx) {
    btn.classList.add('correct');
    fb.textContent = '✓ Doğru!';
    fb.className = 'feedback correct';
    correct++;
  } else {
    btn.classList.add('wrong');
    buttons[correct_idx].classList.add('reveal');
    fb.textContent = `✗ Yanlış! Doğru cevap: ${letters[correct_idx]}) ${questions[shuffled[current]].o[correct_idx]}`;
    fb.className = 'feedback wrong';
    wrong++;
  }

  fb.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
  updateScore();
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) {
    showFinish();
  } else {
    showQuestion();
  }
}

function updateScore() {
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-answered').textContent = correct + wrong;
  document.getElementById('sc-remain').textContent = shuffled.length - current;
}

function showFinish() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';
  const fs = document.getElementById('finish-screen');
  fs.style.display = 'block';
  const total = shuffled.length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById('final-score').textContent = `${correct} / ${total}`;
  let msg = '';
  if (pct >= 85) msg = 'Muhteşem! Sınava hazırsın!';
  else if (pct >= 70) msg = 'Çok iyi! Biraz daha çalışmaya devam et.';
  else if (pct >= 50) msg = 'Fena değil, ama daha fazla pratik yapmalısın.';
  else msg = 'Daha çok çalışman gerekiyor. Tekrar dene!';
  document.getElementById('final-text').textContent = `Başarı oranı: %${pct} — ${msg}`;
  updateScore();
}

function restartQuiz() {
  startQuiz();
}

startQuiz();
</script>
